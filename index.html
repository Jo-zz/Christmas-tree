<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merry Christmas - Luxury Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #020617; /* Slate 950 */
        color: white;
        overflow: hidden;
        font-family: 'Pinyon Script', cursive;
      }
      #root {
        height: 100vh;
        width: 100vw;
      }
      /* Custom Gold Gradient Animation */
      @keyframes shine {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .gold-text {
        background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        background-size: 200% auto;
        color: transparent;
        background-clip: text;
        -webkit-background-clip: text;
        animation: shine 4s linear infinite;
        text-shadow: 0px 0px 30px rgba(251, 191, 36, 0.5);
      }
    </style>
    <!-- 修复 Import Map：统一依赖版本 + 移除无效路径 -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",

    "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?react=18.3.1&three=0.160.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?react=18.3.1&three=0.160.0&@react-three/fiber=8.15.14",
    "@react-three/postprocessing": "https://esm.sh/@react-three/postprocessing@2.16.0?react=18.3.1&three=0.160.0&@react-three/fiber=8.15.14",
    "postprocessing": "https://esm.sh/postprocessing@6.34.1?three=0.160.0",
    "@mediapipe/tasks-vision": "https://esm.sh/@mediapipe/tasks-vision@0.10.9",
    "uuid": "https://esm.sh/uuid@9.0.1"
  }
}
    </script>
  </head>

    <div id="root"></div>
